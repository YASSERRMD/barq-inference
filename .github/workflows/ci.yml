name: Native CI/CD (Rust)
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2
      - name: Check formatting
        run: cargo fmt --all -- --check
      - name: Lint with Clippy
        run: cargo clippy --all-targets -- -D warnings
      - name: Test barq_core
        run: cargo test -p barq_core
      - name: Test quant
        run: cargo test -p quant
      - name: Test vocab
        run: cargo test -p vocab
      - name: Test models
        run: cargo test -p models
      - name: Test sampling
        run: cargo test -p sampling
      - name: Test advanced
        run: cargo test -p advanced
      - name: Test cli
        run: cargo test -p barq-inference
      - name: Compile benches
        run: cargo bench -p barq-inference --benches --no-run
